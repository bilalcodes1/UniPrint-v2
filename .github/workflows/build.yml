name: Build UniPrint

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── macOS build → .dmg ──────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps into backend/venv
        run: |
          python -m venv backend/venv
          backend/venv/bin/pip install --upgrade pip
          backend/venv/bin/pip install -r backend/requirements.txt

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Electron deps
        run: npm install
        working-directory: electron

      - name: Build macOS .dmg
        run: npm run build:mac
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: UniPrint-macOS
          path: electron/dist/*.dmg

  # ── Windows build → .exe installer ─────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps into backend/venv
        run: |
          python -m venv backend\venv
          backend\venv\Scripts\pip install --upgrade pip
          backend\venv\Scripts\pip install -r backend\requirements.txt

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Electron deps
        run: npm install
        working-directory: electron

      - name: Build Windows .exe installer
        run: npm run build:win
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: UniPrint-Windows
          path: electron/dist/*.exe

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: UniPrint-macOS
          path: ./release

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: UniPrint-Windows
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: UniPrint ${{ github.ref_name }}
          body: |
            ## 🖨️ UniPrint ${{ github.ref_name }}
            نظام إدارة طلبات الطباعة لمكتبات جامعة الأنبار

            | النظام | الملف |
            |--------|-------|
            | 🍎 macOS (Intel + Apple Silicon) | `UniPrint-*.dmg` |
            | 🪟 Windows 10/11 (64-bit) | `UniPrint-Setup-*.exe` |
          files: ./release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
