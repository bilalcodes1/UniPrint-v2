name: Build UniPrint

on:
  push:
    tags:
      - 'v*'          # trigger on v2.0.0, v2.1.0, etc.
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: write   # needed to create GitHub Release

jobs:
  # ── macOS build → .dmg ──────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps + PyInstaller
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend (PyInstaller → backend-mac)
        run: |
          cd backend
          pyinstaller uniprint.spec --distpath ../electron/resources --name backend-mac
          ls -lh ../electron/resources/

      - name: Build frontend (SvelteKit)
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install Electron deps
        run: |
          cd electron
          npm ci

      - name: Build macOS .dmg
        run: |
          cd electron
          npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniPrint-macOS
          path: electron/dist/*.dmg

  # ── Windows build → .exe installer ─────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps + PyInstaller
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend (PyInstaller → backend.exe)
        run: |
          cd backend
          pyinstaller uniprint.spec --distpath ..\electron\resources --name backend
          dir ..\electron\resources\

      - name: Build frontend (SvelteKit)
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install Electron deps
        run: |
          cd electron
          npm ci

      - name: Build Windows .exe installer
        run: |
          cd electron
          npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniPrint-Windows
          path: electron/dist/*.exe

  # ── Create GitHub Release with both files ───────────────────────────────────
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: UniPrint-macOS
          path: ./release

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: UniPrint-Windows
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: UniPrint ${{ github.ref_name }}
          body: |
            ## 🖨️ UniPrint ${{ github.ref_name }}

            نظام إدارة طلبات الطباعة لمكتبات جامعة الأنبار

            ### تحميل
            | النظام | الملف |
            |--------|-------|
            | 🍎 macOS (Apple Silicon + Intel) | `UniPrint-*.dmg` |
            | 🪟 Windows 10/11 (64-bit) | `UniPrint-Setup-*.exe` |

            ### متطلبات
            - macOS 11+ أو Windows 10+
            - 4GB RAM، 2GB مساحة حرة
            - اتصال شبكة محلي (Wi-Fi)
          files: ./release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
