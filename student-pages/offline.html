<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UniPrint — غير متصل</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #F2F2F7;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      text-align: center; padding: 24px; direction: rtl;
    }
    .icon  { font-size: 64px; margin-bottom: 16px; }
    h1     { font-size: 22px; font-weight: 700; color: #1C1C1E; margin: 0 0 8px; }
    p      { font-size: 15px; color: #6C6C70; margin: 0 0 32px; max-width: 280px; }
    button {
      padding: 14px 32px; background: #2D6BE4; color: #fff;
      border: none; border-radius: 14px; font-size: 16px;
      font-weight: 600; cursor: pointer; font-family: inherit;
    }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>لا يوجد اتصال</h1>
  <p>تحقق من اتصالك بشبكة Wi-Fi المكتبة ثم حاول مجدداً.</p>
  <button onclick="window.location.reload()">🔄 إعادة المحاولة</button>
</body>
</html>
